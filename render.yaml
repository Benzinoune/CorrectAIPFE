services:
  - type: web
    name: correctai-backend-ai
    runtime: docker
    dockerfilePath: ./backend-ai/Dockerfile
    dockerContext: ./backend-ai
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: CORRECTAI_DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "8000"
